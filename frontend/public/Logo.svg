<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="100%" height="100%">
  <defs>
    <!-- Vibrant green-to-emerald gradient for a modern tech feel -->
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- Logo Mark (Centered with Transparent Background) -->
  <g transform="translate(0, 0)">
    <!-- Outer Hexagon Node Structure -->
    <polygon points="80,15 140,50 140,120 80,154 20,120 20,50" 
             fill="none" 
             stroke="url(#hexGrad)" 
             stroke-width="8" 
             stroke-linejoin="round"/>
    
    <!-- Left Code Bracket < -->
    <path d="M 62 60 L 40 82 L 62 104" 
          fill="none" 
          stroke="#10B981" 
          stroke-width="10" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Right Code Bracket > -->
    <path d="M 98 60 L 120 82 L 98 104" 
          fill="none" 
          stroke="#10B981" 
          stroke-width="10" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    
    <!-- Central Connection Point -->
    <circle cx="80" cy="82" r="8" fill="#FFFFFF"/>
  </g>
</svg>
